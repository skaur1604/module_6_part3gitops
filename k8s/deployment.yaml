apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app
  labels:
    app: student-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-app
  template:
    metadata:
      labels:
        app: student-app
    spec:
      containers:
        - name: student-app
          image: ghcr.io/skaur1604/module_6_part_3:4ab837425edda0d5de143aec26189de1bb523d2d
          ports:
            - containerPort: 80